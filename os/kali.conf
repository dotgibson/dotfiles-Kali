# dotfiles-Kali/os/kali.conf  ->  ~/.config/tmux/os.conf
# OS-native tmux layer, sourced by Core's tmux.conf. Per-OS status-line bits.

# WSL has no battery; don't render an empty battery widget.
set -g @batt_enable false

# Network-speed widget watches the primary interface. Left at the "eth0" sentinel it
# AUTO-DERIVES the primary iface from the default route below (correct on WSL2, and on a
# mirrored-networking host-visible iface). To PIN one, set anything other than eth0 here —
# the auto-derive is then skipped.
set -g @netspeed_iface "eth0"
# Override the eth0 sentinel with the real default-route iface — ONLY while it's still
# "eth0" (so a pinned value above is respected). Covers IPv4 AND IPv6; portable
# (command -v guard + sed, busybox-safe); fails safe to eth0 when nothing found.
run-shell 'cur=$(tmux show -gv @netspeed_iface 2>/dev/null); [ "$cur" = "eth0" ] && command -v ip >/dev/null 2>&1 && i=$(ip -o route show default 2>/dev/null | sed -n "s/.* dev \([^ ]*\).*/\1/p" | head -1) && [ -n "$i" ] && tmux set -g @netspeed_iface "$i"'

# ── offensive layer: engagement popup (twin of Core's prefix+f sessionizer) ──
bind e display-popup -E -w 60% -h 70% "~/.config/tmux/tmux-eng.sh"
