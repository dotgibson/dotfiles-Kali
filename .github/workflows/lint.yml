name: lint

# Thin caller for the reusable shell/actionlint gate authored in dotfiles-core
# (.github/workflows/lint-call.yml) — one definition for the whole fleet. Kali passes the
# one per-repo input: its vendored htpx offensive/companion/ subtree is excluded (gated by
# its own companion CI), on top of the standard core/ exclude.
on:
  push:
    branches: [main, master]
    paths-ignore: ["**.md", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE"]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: dotgibson/dotfiles-core/.github/workflows/lint-call.yml@v4
    with:
      # Bare git pathspec — NO surrounding single quotes. lint-call.yml word-splits this
      # into a bash array, so literal quotes would become part of the token and the
      # exclude would silently not match (the companion subtree would then be linted).
      extra_ls_files_excludes: ":!:offensive/companion/**"
