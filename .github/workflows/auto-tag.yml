name: auto-tag

# Cut THIS repo's own next vX.Y.Z release tag when a vendored subtree lands new content
# on main. Delegates to the reusable workflow in dotfiles-core — one definition of the
# version math + tagging (scripts/auto-tag.sh): PATCH-bump by default, idempotent (a
# no-op when HEAD is already tagged vX.Y.Z), and it tags in CI so this repo's own tag
# stops drifting from what it vendors. Pinned @v3.
#
# Kali is the exception in the fleet: it carries TWO vendored lines, not one — the
# `core/` subtree (from dotfiles-core) AND the `offensive/companion/` subtree (from
# htpx, provenance in companion.lock, synced by scripts/sync-companion.sh). Both are
# releasable, so both must cut a tag; watching only `core/**` (the copy-pasted default
# from the OS repos) silently dropped every companion bump (G6). Watch all three.
on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'offensive/companion/**'
      - 'companion.lock'

permissions:
  contents: write

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    uses: dotgibson/dotfiles-core/.github/workflows/auto-tag-call.yml@v3
