name: companion-freshness

# Consumer-side freshness watcher for the vendored offensive/companion/ subtree. htpx
# (Gerrrt/htpx) is the source of truth for the structured red<->blue companion and is
# vendored here via git subtree; nothing on THIS side tracked whether the vendored copy
# had fallen behind upstream — so a fix landing in htpx could sit un-pulled here
# indefinitely. Weekly (and on demand) this checks the recorded vendored commit
# (companion.lock's companion_sha) against upstream's tip; a behind result is the NUDGE
# to run scripts/sync-companion.sh. Mirrors this repo's core-freshness watcher
# (freshness.yml) — scheduled an hour later so the two don't fire at once.

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC (an hour after core-freshness' 07:00 run)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: companion-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vendored-companion:
    # Scheduled runs fire on every fork that has Actions enabled; gate on the owner so a
    # fork's clock doesn't burn minutes (and email a red run) on a watcher that only
    # matters for the canonical repo. workflow_dispatch from a fork still no-ops cleanly.
    if: github.repository_owner == 'Gerrrt'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # companion.lock is the fast path; keep full history in step with the core watcher
      - name: Check vendored offensive/companion/ against upstream htpx
        run: |
          # Capture output + exit code and branch on it: the script exits 0 for
          # current/skip, 2 for drift (the nudge), 1 for a hard failure (e.g. a malformed
          # companion.lock). `|| rc=$?` keeps the step's set -e from aborting before we branch.
          rc=0
          out="$(./test/check-companion-freshness.sh 2>&1)" || rc=$?
          printf '%s\n' "$out"
          case "$rc" in
            0)
              {
                echo "### ✅ vendored offensive/companion/ freshness"
                echo ""
                echo '```'
                printf '%s\n' "$out"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              {
                echo "### ⚠️ vendored offensive/companion/ is behind upstream htpx"
                echo ""
                echo '```'
                printf '%s\n' "$out"
                echo '```'
                echo ""
                echo "Pull the companion, then review + drift-check the generated views:"
                echo ""
                echo '```'
                echo "scripts/sync-companion.sh"
                echo "offensive/companion/gen-views.sh --check"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
            *)
              {
                echo "### ❌ companion-freshness check failed (exit $rc)"
                echo ""
                echo '```'
                printf '%s\n' "$out"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
              ;;
          esac
